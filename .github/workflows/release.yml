name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        shell: pwsh
        run: npm run tauri build

      - name: Sign and package updater bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $nsisExe = "src-tauri\target\release\bundle\nsis\Tidekeeper_${version}_x64-setup.exe"
          $nsisZip = "src-tauri\target\release\bundle\nsis\Tidekeeper_${version}_x64-setup.nsis.zip"

          $keyPath = Join-Path $env:TEMP "tauri_signing.key"
          [System.IO.File]::WriteAllText($keyPath, $env:TAURI_SIGNING_PRIVATE_KEY)

          Compress-Archive -Path $nsisExe -DestinationPath $nsisZip -Force

          if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            npx tauri signer sign -k $keyPath -p $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $nsisZip
          } else {
            npx tauri signer sign -k $keyPath $nsisZip
          }

      - name: Create release and upload assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tagName = "${{ github.ref_name }}"
          $msiBundle = "src-tauri\target\release\bundle\msi\Tidekeeper_${version}_x64_en-US.msi"
          $nsisExe   = "src-tauri\target\release\bundle\nsis\Tidekeeper_${version}_x64-setup.exe"
          $nsisZip   = "src-tauri\target\release\bundle\nsis\Tidekeeper_${version}_x64-setup.nsis.zip"
          $nsisSig   = "src-tauri\target\release\bundle\nsis\Tidekeeper_${version}_x64-setup.nsis.zip.sig"

          gh release view $tagName --json tagName | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tagName `
              --title "Tidekeeper $tagName" `
              --notes "Download the .exe installer below to install or update Tidekeeper."
          }

          gh release upload $tagName $msiBundle --clobber
          gh release upload $tagName $nsisExe   --clobber
          gh release upload $tagName $nsisZip   --clobber
          gh release upload $tagName $nsisSig   --clobber

          $sig = (Get-Content $nsisSig -Raw).Trim()
          $url = "https://github.com/ToobsTube/Tidekeeper/releases/download/${tagName}/Tidekeeper_${version}_x64-setup.nsis.zip"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          gh release upload $tagName latest.json --clobber
