name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tidekeeper ${{ github.ref_name }}'
          releaseBody: 'Download the .exe installer below to install or update Tidekeeper.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Upload updater bundle and generate latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tagName = "${{ github.ref_name }}"
          $nsisZip = "src-tauri/target/release/bundle/nsis/Tidekeeper_${version}_x64-setup.nsis.zip"
          $nsisSig = "${nsisZip}.sig"

          gh release upload $tagName $nsisZip --clobber
          gh release upload $tagName $nsisSig --clobber

          $sig = (Get-Content $nsisSig -Raw).Trim()
          $url = "https://github.com/ToobsTube/Tidekeeper/releases/download/${tagName}/Tidekeeper_${version}_x64-setup.nsis.zip"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          gh release upload $tagName latest.json --clobber
