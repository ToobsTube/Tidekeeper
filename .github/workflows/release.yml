name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tidekeeper ${{ github.ref_name }}'
          releaseBody: 'Download the .exe installer below to install or update Tidekeeper.'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Upload updater bundle and generate latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tagName = "${{ github.ref_name }}"
          $base = "$env:GITHUB_WORKSPACE\src-tauri\target\release\bundle\nsis"

          Write-Host "=== NSIS bundle directory ==="
          if (Test-Path $base) { Get-ChildItem $base | Select-Object Name } else { Write-Host "Directory not found: $base" }
          Write-Host "=== End listing ==="

          $nsisZipName = "Tidekeeper_${version}_x64-setup.nsis.zip"
          $nsisSigName = "Tidekeeper_${version}_x64-setup.nsis.zip.sig"

          if (-not (Test-Path "$base\$nsisZipName")) { Write-Error "NSIS zip not found"; exit 1 }

          Copy-Item "$base\$nsisZipName" "$env:GITHUB_WORKSPACE\$nsisZipName"
          Copy-Item "$base\$nsisSigName" "$env:GITHUB_WORKSPACE\$nsisSigName"

          Set-Location $env:GITHUB_WORKSPACE
          gh release upload $tagName $nsisZipName --clobber
          gh release upload $tagName $nsisSigName --clobber

          $sig = (Get-Content $nsisSigName -Raw).Trim()
          $url = "https://github.com/ToobsTube/Tidekeeper/releases/download/${tagName}/${nsisZipName}"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          gh release upload $tagName latest.json --clobber
